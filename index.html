        // Componente para renderizar o Código de Barras
        const BarcodeItem = ({ code }) => {
            const barcodeRef = React.useRef(null);
            
            React.useEffect(() => {
                if (barcodeRef.current && typeof JsBarcode === 'function') {
                    try {
                        JsBarcode(barcodeRef.current, code, {
                            format: "CODE128", // Formato padrão aceito na maioria dos leitores
                            displayValue: false, // Oculta o número automático para não duplicar com o nosso
                            width: 1.4, // Largura das barras
                            height: 25, // Altura do código de barras
                            margin: 0,
                            background: "transparent"
                        });
                    } catch (e) {
                        console.error("Erro ao gerar código de barras para", code, e);
                    }
                }
            }, [code]);
            
            return <svg ref={barcodeRef} className="w-full max-h-[30px] mt-0.5 mb-0.5"></svg>;
        };

        // Componente Principal
        const App = () => {
            // Ordenar alfabeticamente
            const sortedData = [...rawData].sort((a, b) => a.name.localeCompare(b.name));
            
            const getImageUrl = (name) => {
                // Placeholder genérico para quando adicionar um novo produto
                const firstName = name.split(' ')[0] || 'Produto';
                return `https://placehold.co/200x200/f0f4f8/009B3A?text=${encodeURIComponent(firstName)}`;
            };

            // Estado para armazenar os itens
            const [items, setItems] = React.useState(() => {
                const saved = localStorage.getItem('hortifruti_dados_v3');
                if (saved) {
                    return JSON.parse(saved);
                }
                return sortedData;
            });

            // Salvar automaticamente no navegador
            React.useEffect(() => {
                localStorage.setItem('hortifruti_dados_v3', JSON.stringify(items));
            }, [items]);

            // Estado para controlar o modo de edição
            const [isEditing, setIsEditing] = React.useState(false);

            // Funções de edição
            const updateItem = (index, field, value) => {
                const newItems = [...items];
                newItems[index][field] = value;
                setItems(newItems);
            };

            const deleteItem = (index) => {
                if(window.confirm('Tem certeza que deseja remover este produto?')) {
                    const newItems = items.filter((_, i) => i !== index);
                    setItems(newItems);
                }
            };

            const addItem = () => {
                setItems([{ name: "NOVO PRODUTO", code: "0000", image: getImageUrl("NOVO PRODUTO") }, ...items]);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetData = () => {
                if(window.confirm('Isso apagará todas as suas edições manuais e restaurará a lista original. Continuar?')) {
                    setItems(sortedData);
                    localStorage.removeItem('hortifruti_dados_v3');
                    setIsEditing(false);
                }
            };

            const copyCodeToClipboard = () => {
                const codeString = `        const rawData = [\n` + 
                    items.map(item => `            { name: "${item.name}", code: "${item.code}", image: "${item.image}" }`).join(',\n') + 
                    `\n        ];`;
                
                navigator.clipboard.writeText(codeString).then(() => {
                    alert("✅ Lista copiada com sucesso!\n\nAbra o seu arquivo HTML no bloco de notas, apague a lista antiga (da linha 76 até 145) e cole essa nova no lugar. Salve e mande para o GitHub!");
                }).catch(() => {
                    prompt("O seu navegador bloqueou a cópia automática. Copie o código abaixo manualmente (Ctrl+C):", codeString);
                });
            };

            const toggleEditMode = () => {
                if (isEditing) {
                    // Ordena ao sair do modo de edição para manter a organização
                    const sorted = [...items].sort((a, b) => a.name.localeCompare(b.name));
                    setItems(sorted);
                }
                setIsEditing(!isEditing);
            };

            // Função para trocar a imagem clicando nela
            const handleImageChange = (index) => {
                const newUrl = prompt(`Cole a URL de uma imagem realista para: ${items[index].name}\n(Exemplo: copie o endereço de uma imagem do Google)`);
                if (newUrl && newUrl.trim() !== '') {
                    const newItems = [...items];
                    newItems[index].image = newUrl;
                    setItems(newItems);
                }
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Barra de Ferramentas (Oculta na impressão) */}
                    <div className="no-print bg-white p-4 shadow-md mb-6 flex flex-col gap-4">
                        <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-800">Caderno do Hortifruti</h1>
                                <p className="text-sm text-gray-600 mt-1">
                                    {isEditing ? (
                                        <strong className="text-red-600">Modo de Edição Ativo: Altere nomes, códigos ou adicione produtos.</strong>
                                    ) : (
                                        <span><strong>Dica:</strong> Clique em "Editar Caderno" para alterar nomes/códigos, ou clique nas imagens para trocar as fotos.</span>
                                    )}
                                </p>
                            </div>
                            <div className="flex flex-wrap gap-2 justify-center">
                                {isEditing ? (
                                    <>
                                        <button onClick={addItem} className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition-colors text-sm">
                                            + Adicionar Produto
                                        </button>
                                        <button onClick={resetData} className="bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 px-4 rounded shadow transition-colors text-sm">
                                            Restaurar Original
                                        </button>
                                        <button onClick={copyCodeToClipboard} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded shadow transition-colors text-sm">
                                            Copiar Código Definitivo
                                        </button>
                                        <button onClick={toggleEditMode} className="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded shadow transition-colors text-sm">
                                            Concluir Edições
                                        </button>
                                    </>
                                ) : (
                                    <button onClick={toggleEditMode} className="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded shadow transition-colors text-sm flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                                        </svg>
                                        Editar Caderno
                                    </button>
                                )}
                                <button 
                                    onClick={() => { if(!isEditing) window.print(); else { toggleEditMode(); setTimeout(() => window.print(), 500); } }} 
                                    className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition-colors flex items-center gap-2 text-sm"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                      <path fillRule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z" clipRule="evenodd" />
                                    </svg>
                                    Imprimir
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Grid de Produtos */}
                    <div className="max-w-[1200px] mx-auto px-2 print-container">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 print-grid">
                            {items.map((item, index) => (
                                <div key={index} className="bg-white rounded-lg flex flex-row shadow-sm w-full h-[145px] overflow-hidden border border-gray-100 page-break-avoid relative group">
                                    
                                    {/* Botão de excluir no modo edição */}
                                    {isEditing && (
                                        <button 
                                            onClick={() => deleteItem(index)}
                                            className="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow-md z-10 hover:bg-red-700 no-print"
                                            title="Remover produto"
                                        >
                                            X
                                        </button>
                                    )}

                                    {/* Lado Esquerdo - Informações */}
                                    <div className="flex-[3] flex flex-col p-1.5 relative">
                                        
                                        {/* Letra no canto e Código */}
                                        <div className="flex items-start">
                                            <div className="bg-[#002776] text-white font-black text-2xl w-8 h-8 flex items-center justify-center leading-none uppercase">
                                                {(item.name.charAt(0) || ' ').toUpperCase()}
                                            </div>
                                            <div className="flex-1 ml-1.5 mt-0.5">
                                                <div className="bg-[#FEDF00] text-[#002776] text-[9px] font-bold px-1 py-0.5 rounded-sm inline-block tracking-wider uppercase">
                                                    Código
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* Número Grande */}
                                        {isEditing ? (
                                            <input 
                                                type="text" 
                                                value={item.code} 
                                                onChange={(e) => updateItem(index, 'code', e.target.value)}
                                                className="w-full text-[24px] font-black text-[#002776] text-center mt-0 tracking-tighter leading-none border-b-2 border-dashed border-[#002776] focus:outline-none focus:bg-gray-100 print-text-code"
                                                placeholder="CÓDIGO"
                                            />
                                        ) : (
                                            <div className="text-[26px] font-black text-[#002776] text-center mt-0 tracking-tighter leading-none print-text-code">
                                                {item.code}
                                            </div>
                                        )}
                                        
                                        {/* Código de Barras Escaneável */}
                                        <div className="flex justify-center items-center w-full px-1">
                                            <BarcodeItem code={item.code} />
                                        </div>
                                        
                                        <div className="mt-auto"></div>
                                        
                                        {/* Faixa Produto e Nome */}
                                        <div className="w-full px-1 mb-1">
                                            <div className="bg-[#FEDF00] w-full text-[#002776] text-[9px] font-bold px-1 py-0.5 rounded-sm text-center tracking-wider uppercase">
                                                Produto
                                            </div>
                                            {isEditing ? (
                                                <input 
                                                    type="text" 
                                                    value={item.name} 
                                                    onChange={(e) => updateItem(index, 'name', e.target.value.toUpperCase())}
                                                    className="w-full text-[10px] sm:text-[11px] font-black text-[#002776] text-center mt-1 uppercase leading-[1.1] border-b-2 border-dashed border-[#002776] focus:outline-none focus:bg-gray-100 h-auto print-text-name"
                                                    placeholder="NOME DO PRODUTO"
                                                />
                                            ) : (
                                                <div className="text-[11px] font-black text-[#002776] text-center mt-1 uppercase leading-[1.1] h-auto flex items-center justify-center break-words print-text-name">
                                                    {item.name}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    {/* Linha Divisória */}
                                    <div className="w-[1px] h-[85%] bg-[#002776] my-auto opacity-30"></div>
                                    
                                    {/* Lado Direito - Imagem Editável */}
                                    <div 
                                        className="flex-[2] bg-white flex items-center justify-center p-2 cursor-pointer relative group"
                                        onClick={() => handleImageChange(index)}
                                        title="Clique para alterar a imagem"
                                    >
                                        <img 
                                            src={item.image} 
                                            alt={item.name} 
                                            className="max-w-full max-h-[110px] object-contain transition-transform group-hover:scale-105 drop-shadow-md print-img"
                                            onError={(e) => {
                                                e.target.onerror = null; // Evita loop infinito
                                                const firstName = item.name.split(' ')[0];
                                                e.target.src = `https://placehold.co/200x200/f0f4f8/009B3A?text=${encodeURIComponent(firstName)}`;
                                            }}
                                        />
                                        <div className="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity no-print rounded-r-lg">
                                            <span className="text-white text-xs font-bold text-center px-1">Editar Foto</span>
                                        </div>
                                    </div>

                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
